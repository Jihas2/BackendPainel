spring.application.name=PainelOnline

# Banco de dados - usar variáveis de ambiente
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/Painel}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true

# CONFIG API CAMBIO
cambio.api.url=${CAMBIO_API_URL:https://economia.awesomeapi.com.br/json/last/USD-BRL}